<!DOCTYPE html>
<html>
<head>
    <title>Thumbnail Image Gallery</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .gallery img {
            margin: 10px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <div class="gallery">

        </a>

        <!-- Image 2 -->

            <img src="image2_large.jpg" alt="Image 2" height="100" width="100">
        </a>

            <img src="image3_large.jpg" alt="Image 3" height="100" width="100">
        </a>

        <!-- Image 4 -->
        <a href="image4_large.jpg" target="_blank">
            <img src="image4_large.jpg" alt="Image 4" height="100" width="100">
        </a>
    </div>

</body>
</html>
