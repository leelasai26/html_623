<!DOCTYPE html>
<html>
<head>
    <title>Hyperlink Example</title>
</head>
<body>

    <h1>Working of Hyperlinks in HTML</h1>

    <p>
        1. Basic Hyperlink (opens in the same tab):
        <br>
        <a href= https://zapier.com/blog/best-ai-website-builder/
            Visit Farmer AI
        </a>
    </p>

    <p>
        2. Hyperlink using target="_blank" (opens in a new tab):
        <br>
        <a href="https://www.wikipedia.org" target="_blank">
            Visit Wikipedia
        </a>
    </p>

    <p>
        3. Hyperlink to another page in the same folder:
        <br>
        <a href="about.html" target="_self">
            Go to About Page
        </a>
    </p>

    <p>
        4. Hyperlink to send an Email:
        <br>
        <a href="mailto:example@gmail.com">
            Send Email
        </a>
    </p>

</body>
</html>
