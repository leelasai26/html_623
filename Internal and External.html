<!DOCTYPE html>
<html>
    <head>
        <title>Internal and External JavaScript</title>
        <!---Internal Java Script--->
        <Script>
            function showInternalMessage() {
                alert("This message is from Internal JavaScript!");
            }
        </Script>
        <!---External Java Script--->
        <Script src="external.js"></Script>
    </head>
    <body>
        <h2>Embedding Internal and External JavaScript</h2>
        <button onclick="show Internal Message()">Internal JavaScript</button>
        <br><br>
        <button onclick="show External Message()">External JavaScript</button>
    </body>
</html>
